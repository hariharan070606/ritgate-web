services:
  - type: web
    name: ritgate-web
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    headers:
      # ── Security headers (applied to every response) ──
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: Permissions-Policy
        value: camera=(self), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Content-Security-Policy
        # script-src uses the sha256 of the inline theme script in index.html
        # (no 'unsafe-inline'). If that script changes, regenerate the hash.
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https://rit-gate.onrender.com; script-src 'self' 'sha256-eHnM6VZPChiGQd+vc81GgYBd8+D/8mMAUtIaIPTAMb0=' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://rit-gate.onrender.com; worker-src 'self' blob:; media-src 'self' blob:; manifest-src 'self'; upgrade-insecure-requests"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
